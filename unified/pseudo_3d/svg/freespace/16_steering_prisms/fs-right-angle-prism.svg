<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 80" width="110" height="80" font-family="Arial, Helvetica, sans-serif">
<defs>
<marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#000000"/></marker>
<marker id="arrowhead-beam" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#CC0000"/></marker>
<linearGradient id="prism-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#D8E0F0"/><stop offset="50%" stop-color="#E8F0FF"/><stop offset="100%" stop-color="#B0B8D0"/></linearGradient>
</defs>
<polygon points="30,20 30,60 70,60" fill="url(#prism-grad)" stroke="#000000" stroke-width="0.75"/>
<line x1="5" y1="40" x2="30" y2="40" stroke="#CC0000" stroke-width="0.8" opacity="0.4"/>
<line x1="8" y1="40" x2="20" y2="40" stroke="#CC0000" stroke-width="0.8" marker-end="url(#arrowhead-beam)"/>
<line x1="50" y1="60" x2="50" y2="78" stroke="#CC0000" stroke-width="0.8" opacity="0.4"/>
<line x1="50" y1="65" x2="50" y2="75" stroke="#CC0000" stroke-width="0.8" marker-end="url(#arrowhead-beam)"/>
<text x="55" y="78" font-family="Arial, Helvetica, sans-serif" font-size="5.5" fill="#666666" text-anchor="middle" font-weight="normal">90° turn</text>
<text x="55" y="15" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#000000" text-anchor="middle" font-weight="bold">Right-angle prism</text>
</svg>
