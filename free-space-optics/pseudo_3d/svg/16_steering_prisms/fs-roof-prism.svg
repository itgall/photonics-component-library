<polygon points="25,15 75,15 75,55 25,55" fill="url(#prism-grad)" stroke="#000000" stroke-width="0.75"/>
<line x1="50" y1="15" x2="50" y2="55" stroke="#000000" stroke-width="0.5" opacity="0.4"/>
<line x1="5" y1="35" x2="25" y2="35" stroke="#CC0000" stroke-width="0.8" opacity="0.5"/>
<line x1="8" y1="35" x2="18" y2="35" stroke="#CC0000" stroke-width="0.8" marker-end="url(#arrowhead-beam)"/>
<line x1="75" y1="35" x2="95" y2="35" stroke="#CC0000" stroke-width="0.8" opacity="0.5"/>
<text x="50" y="65" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#000000" text-anchor="middle" font-weight="bold">Roof prism</text>
</svg>
