<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="100" height="80" font-family="Arial, Helvetica, sans-serif">
<defs>
<marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#000000"/></marker>
<marker id="arrowhead-beam" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#CC0000"/></marker>
<linearGradient id="glass-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#D8E4F8"/><stop offset="100%" stop-color="#A8B8D8"/></linearGradient>
</defs>
<polygon points="55,15 85,40 55,65" fill="url(#glass-grad)" stroke="#000000" stroke-width="0.75"/>
<line x1="55" y1="15" x2="55" y2="65" stroke="#000000" stroke-width="0.35" opacity="0.4"/>
<line x1="5" y1="30" x2="55" y2="30" stroke="#CC0000" stroke-width="0.8" opacity="0.4"/>
<line x1="10" y1="30" x2="30" y2="30" stroke="#CC0000" stroke-width="0.8" marker-end="url(#arrowhead-beam)"/>
<line x1="55" y1="50" x2="5" y2="50" stroke="#CC0000" stroke-width="0.8" opacity="0.4"/>
<line x1="45" y1="50" x2="20" y2="50" stroke="#CC0000" stroke-width="0.8" marker-end="url(#arrowhead-beam)"/>
<text x="50" y="75" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#000000" text-anchor="middle" font-weight="bold">Corner cube</text>
</svg>
