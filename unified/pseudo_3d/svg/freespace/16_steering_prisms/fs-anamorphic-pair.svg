<line x1="8" y1="37" x2="20" y2="37" stroke="#CC0000" stroke-width="0.8" marker-end="url(#arrowhead-beam)"/>
<line x1="100" y1="31" x2="155" y2="31" stroke="#CC0000" stroke-width="0.4" opacity="0.3"/>
<line x1="100" y1="37" x2="155" y2="37" stroke="#CC0000" stroke-width="0.4" opacity="0.3"/>
