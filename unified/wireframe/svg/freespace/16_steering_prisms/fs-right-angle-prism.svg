<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 80" width="110" height="80" font-family="Arial, Helvetica, sans-serif">
<defs>
<marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#1a1a1a"/></marker>
<marker id="arrowhead-beam" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0,0 6,2 0,4" fill="#c0392b"/></marker>
</defs>
<polygon points="30,20 30,60 70,60" fill="#f4f6fa" stroke="#1a1a1a" stroke-width="0.5"/>
<line x1="5" y1="40" x2="30" y2="40" stroke="#c0392b" stroke-width="0.6" opacity="0.4"/>
<line x1="8" y1="40" x2="20" y2="40" stroke="#c0392b" stroke-width="0.6" marker-end="url(#arrowhead-beam)"/>
<line x1="50" y1="60" x2="50" y2="78" stroke="#c0392b" stroke-width="0.6" opacity="0.4"/>
<line x1="50" y1="65" x2="50" y2="75" stroke="#c0392b" stroke-width="0.6" marker-end="url(#arrowhead-beam)"/>
<text x="55" y="78" font-family="Arial, Helvetica, sans-serif" font-size="5.5" fill="#888888" text-anchor="middle" font-weight="normal">90° turn</text>
<text x="55" y="15" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Right-angle prism</text>
</svg>
