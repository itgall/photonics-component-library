<polygon points="30,20 30,55 55,55" fill="url(#prism-grad)" stroke="#000000" stroke-width="0.75"/>
<polygon points="75,20 100,20 100,55" fill="url(#prism-grad)" stroke="#000000" stroke-width="0.75"/>
<line x1="5" y1="34" x2="30" y2="34" stroke="#CC0000" stroke-width="0.4" opacity="0.3"/>
